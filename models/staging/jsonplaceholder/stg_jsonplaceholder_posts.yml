version: 2

models:
  - name: stg_jsonplaceholder_posts
    description: "Modelo staging para los posts de JSONPlaceholder."
    columns:
      - name: post_id
        description: "Identificador único del post."
        tests:
          - not_null
          - unique

      - name: user_id
        description: "Identificador del usuario autor."
        tests:
          - not_null

      - name: post_title
        description: "Título del post."
        tests:
          - not_null

      - name: post_body
        description: "Contenido del post."
        tests:
          - not_null

    tests:
      - dbt_expectations.expect_table_row_count_to_equal:
          value: 100