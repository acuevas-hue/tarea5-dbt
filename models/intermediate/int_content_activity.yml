version: 2

models:
  - name: int_content_activity
    description: "Modelo intermediate que unifica el contenido de NASA APOD y JSONPlaceholder."
    columns:
      - name: activity_date
        description: "Fecha asociada al contenido."
        tests:
          - not_null

      - name: source_name
        description: "Nombre de la fuente."
        tests:
          - not_null
          - accepted_values:
              values: ['nasa_apod', 'jsonplaceholder_posts']

      - name: content_title
        description: "Título del contenido."
        tests:
          - not_null

      - name: content_category
        description: "Categoría del contenido."
        tests:
          - not_null

      - name: content_description
        description: "Descripción o texto del contenido."

      - name: user_id
        description: "Usuario asociado cuando aplica."

      - name: record_count
        description: "Contador unitario para agregaciones."
        tests:
          - not_null

    tests:
      - dbt_expectations.expect_column_values_to_be_between:
          column_name: record_count
          min_value: 1
          max_value: 1