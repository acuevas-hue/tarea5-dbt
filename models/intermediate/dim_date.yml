version: 2

models:
  - name: dim_date
    description: "Dimensión de fechas utilizada para análisis temporal."
    columns:
      - name: date_day
        description: "Fecha completa."
        tests:
          - not_null
          - unique

      - name: year
        description: "Año."
        tests:
          - not_null

      - name: month
        description: "Mes."
        tests:
          - not_null

      - name: day
        description: "Día del mes."
        tests:
          - not_null

    tests:
      - dbt_expectations.expect_table_row_count_to_be_between:
          min_value: 300
          max_value: 400